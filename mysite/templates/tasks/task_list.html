{% extends 'base.html' %}
<!-- {% load static %} -->

{% block title %}Task List{% endblock %}
{% block content %}
    <h1>Task List</h1>
    <section class="form-wrapper">
        <form method="POST" class="form-group">
            {% csrf_token %}
            {{ form.as_p }}
            <br>
            <button type="submit">Add Task</button>
        </form>
    </section>
    <br><hr>
    <section>
    {% for task in tasks %}
        <div class="list-item">
            <h3>{{ task }}</h3>
        </div>
    {% endfor %}
    </section>
{% endblock %}
